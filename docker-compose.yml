# Neo-TDG Full Stack — Docker Compose
#
# OPTION 1: Cloud LLM (Groq/OpenAI) — no GPU needed
#   export GROQ_API_KEY="your-key"
#   cp config.cloud.yaml config.yaml
#   docker compose up app
#
# OPTION 2: Self-hosted Ollama — needs GPU or lots of RAM
#   docker compose up app ollama
#
# OPTION 3: Everything (app + Ollama + persistent storage)
#   docker compose --profile full up

version: "3.8"

services:
  # ── Streamlit App ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neo-tdg-app
    ports:
      - "7860:7860"
    environment:
      - STREAMLIT_SERVER_PORT=7860
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
    volumes:
      - knowledge_data:/app/knowledge_base
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      ollama:
        condition: service_started
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Ollama LLM Server (optional — only if NOT using cloud LLM) ─
  ollama:
    image: ollama/ollama:latest
    container_name: neo-tdg-ollama
    profiles:
      - full
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Model Puller (one-time init to pull required models) ────────
  ollama-pull:
    image: ollama/ollama:latest
    profiles:
      - full
      - ollama
    depends_on:
      - ollama
    entrypoint: >
      sh -c "
        sleep 5 &&
        ollama pull llama3.2 &&
        ollama pull nomic-embed-text &&
        echo 'Models pulled successfully!'
      "
    environment:
      - OLLAMA_HOST=ollama:11434

volumes:
  knowledge_data:
    driver: local
  ollama_models:
    driver: local
