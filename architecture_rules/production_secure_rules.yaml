# -----------------------------------------------------------------------------
# 16. CRYPTOGRAPHIC STANDARDS                                        [GUIDANCE]
# -----------------------------------------------------------------------------
# FIPS 140-3 + NIST SP 800-131A approved algorithms only.
cryptography:
  approved_symmetric: ["AES-128-GCM", "AES-256-GCM", "ChaCha20-Poly1305"]
  approved_asymmetric: ["RSA-3072", "RSA-4096", "ECDSA-P256", "ECDSA-P384", "Ed25519"]
  approved_hash: ["SHA-256", "SHA-384", "SHA-512", "SHA3-256", "SHA3-512"]
  approved_kdf: ["Argon2id", "PBKDF2-HMAC-SHA256", "scrypt", "HKDF-SHA256"]
  approved_signature: ["RSA-PSS", "ECDSA", "Ed25519"]
  forbidden:
    - "MD5"
    - "SHA-1"
    - "DES"
    - "3DES"
    - "RC4"
    - "Blowfish"
    - "RSA-PKCS1v1.5 (signing)"
    - "RSA-1024"
    - "DH-1024"
    - "ECB mode"
    - "Static IVs"
  key_lifetime:
    data_encryption_key_max_days: 365
    key_encryption_key_max_days: 730
    signing_key_max_days: 1095
  key_storage: "FIPS 140-3 L3 HSM (Thales, Entrust, AWS CloudHSM)"
  pq_readiness:                                # Post-Quantum migration plan
    inventory_complete: true
    hybrid_kem_supported: false                # Track ML-KEM (Kyber) adoption
    target_pqc_ready_by: "2027-12-31"
