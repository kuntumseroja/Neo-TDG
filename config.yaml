# Neo-TDG Configuration
# TechDocGen RAG Expansion - AI-Powered SDLC Knowledge Engine

# === LLM Providers ===
llm_providers:
  ollama:
    enabled: true
    model: deepseek-coder-v2:16b
    base_url: http://localhost:11434
    temperature: 0.3
    max_tokens: 8192

default_llm_provider: ollama

# === RAG Knowledge Store ===
knowledge_store:
  enabled: true
  persist_dir: "./knowledge_base"
  embedding:
    provider: "ollama"              # ollama | sentence-transformers
    model: "nomic-embed-text"       # or "all-MiniLM-L6-v2"
    batch_size: 32
  chunking:
    strategy: "markdown_headers"    # markdown_headers | fixed_size
    max_tokens: 1500
    overlap_tokens: 200
  reranker:
    enabled: true
    model: "bm25_vector_fusion"     # bm25_vector_fusion | cross_encoder
    alpha: 0.5                      # 0=pure BM25, 1=pure vector
  auto_ingest: true
  collection_name: "techdocgen_knowledge"

# === Solution Crawler ===
crawler:
  solution_paths: []                # List of .sln files to crawl
  angular_paths: []                 # Frontend roots
  scan_depth: 10                    # Max directory depth
  include_tests: false              # Include test projects
  scheduler_patterns:
    - "Hangfire"
    - "Quartz"
    - "IHostedService"
  integration_patterns:
    - "HttpClient"
    - "IHttpClientFactory"
    - "IConnectionMultiplexer"
    - "IConsulClient"
    - "IAmazonS3"

  # === Deep Code & Configuration Analysis (opt-in) ===
  # When enabled, the crawler additionally extracts:
  #   - appsettings.json / launchSettings.json / *.config (config_analyzer)
  #   - DI registrations from Startup.cs / Program.cs (dependency_extractor)
  #   - C# type symbols + DDD heuristics (code_analyzer)
  #   - Business domain clusters + cross-domain contracts (domain_mapper)
  # All output is additive — existing crawl fields are unchanged.
  deep_analysis:
    enabled: true
    # Optional explicit project-prefix → domain mapping. Wins over the
    # default name-based clustering. Example:
    #   domain_hints:
    #     Invoicing: ["CoreTax.Invoicing", "CoreTax.Billing"]
    #     Taxpayer:  ["CoreTax.Taxpayer", "CoreTax.Identity"]
    domain_hints: {}

# === API Server ===
api:
  host: "0.0.0.0"
  port: 8080
  cors_origins:
    - "http://localhost:*"
    - "http://127.0.0.1:*"
  websocket:
    enabled: true
    max_connections: 50

# === Output ===
output:
  format: markdown
  directory: ./docs

# === Sandbox (KT-Pro Phase 0) ===
# All runtime paths/ports are resolved by src/ops/sandbox.py from the
# SANDBOX_NAME env var. These knobs are informational — do NOT hard-code
# paths here; use scripts/sandbox_start.sh to launch a branch build.
sandbox:
  port_offset: 10                     # prod_port + 10 = sandbox_port
  base_dir: "knowledge_base/sandbox"  # sandbox state rooted here
  collection_suffix_fmt: "__sandbox_{name}"

# === KT-Pro Feature Flags ===
# Each phase ships behind a flag. Default OFF until the phase is merged and
# validated on the sandbox. Flip per-environment.
kt_pro:
  orphan_mode:      { enabled: false }   # Phase 1
  six_personas:     { enabled: false }   # Phase 2
  evidence_bar:     { enabled: false }   # Phase 3
  citation_ratio:   { enabled: false }   # Phase 4
  doc_style_essa:   { enabled: false }   # Phase 5
  institutional_memory: { enabled: false }  # Phase 6
  qa_matrix:        { enabled: false }   # Phase 7
  diff_explorer:    { enabled: false }   # Phase 8
  airgap_hardening: { enabled: false }   # Phase 9
